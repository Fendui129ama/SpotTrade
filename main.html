<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotTrade — Limit Order Matching · TradeMatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0d12;
      --bg-panel: #12171f;
      --bg-elev: #1a202c;
      --border: #2a3344;
      --green: #22c55e;
      --green-soft: rgba(34, 197, 94, 0.15);
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, 0.15);
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.2);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --radius: 8px;
      --font: 'Space Grotesk', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(30,58,138,0.2), transparent);
    }
    .wrap { max-width: 1140px; margin: 0 auto; padding: 1.5rem; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }
    .logo { font-weight: 700; font-size: 1.6rem; color: var(--accent); letter-spacing: 0.02em; }
    .tagline { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.2rem; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    input.contract {
      width: 260px;
      padding: 0.5rem 0.75rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
    }
    input.contract:focus { outline: none; border-color: var(--accent); }
    .addr { font-family: var(--mono); font-size: 0.8rem; color: var(--green); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
    .btn {
      font-family: var(--font);
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius);
      font-size: 0.9rem;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { filter: brightness(1.1); }
    .btn.small { padding: 0.35rem 0.7rem; font-size: 0.85rem; }
    .btn.green { border-color: var(--green); color: var(--green); }
    .btn.red { border-color: var(--red); color: var(--red); }
    .tabs { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1.25rem; }
    .tab {
      padding: 0.55rem 1rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      border-radius: var(--radius);
      font-size: 0.9rem;
    }
    .tab:hover { color: var(--text); }
    .tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .panel { display: none; }
    .panel.visible { display: block; }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 0.85rem 1rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.85rem;
    }
    .stats span { color: var(--text-dim); }
    .stats strong { color: var(--accent); margin-right: 0.25rem; }
    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem;
      margin-bottom: 1rem;
    }
    .card h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--accent); }
    .card h4 { font-size: 0.9rem; margin: 0.75rem 0 0.4rem; color: var(--text-dim); }
    label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.25rem; }
    .input, select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      margin-bottom: 0.6rem;
    }
    .input:focus, select:focus { outline: none; border-color: var(--accent); }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .row .card { flex: 1; min-width: 260px; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    .msg { padding: 0.55rem 0.75rem; border-radius: var(--radius); margin-top: 0.5rem; font-size: 0.85rem; }
    .msg.ok { background: var(--green-soft); border: 1px solid var(--green); color: var(--green); }
    .msg.err { background: var(--red-soft); border: 1px solid var(--red); color: var(--red); }
    .msg.info { background: var(--accent-soft); border: 1px solid var(--accent); color: var(--accent); }
    .list { list-style: none; }
    .list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .list li:last-child { border-bottom: none; }
    .list .mono { font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim); }
    .side-buy { color: var(--green); }
    .side-sell { color: var(--red); }
    .empty-state { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.95rem; }
    .order-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .order-table th, .order-table td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    .order-table th { color: var(--text-dim); font-weight: 500; }
    .order-table tr:hover { background: var(--bg-elev); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    .help-box { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1rem; }
    .help-box strong { color: var(--accent); }
    pre { font-family: var(--mono); }
    footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-dim); text-align: center; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 500; }
    .badge-buy { background: var(--green-soft); color: var(--green); }
    .badge-sell { background: var(--red-soft); color: var(--red); }
    .badge-active { background: var(--accent-soft); color: var(--accent); }
    #stats-bar span { margin-right: 0.5rem; }
    .input::placeholder { color: var(--text-dim); opacity: 0.8; }
  </style>
</head>
<body>
  <!-- SpotTrade: limit order matching UI for TradeMatch -->
  <div class="wrap">
    <!-- Header: contract address + wallet connect -->
    <header role="banner">
      <div class="brand">
        <div class="logo" aria-label="SpotTrade">SpotTrade</div>
        <p class="tagline">Limit order matching · TradeMatch</p>
      </div>
      <div class="header-right">
        <input type="text" id="contract-address" class="contract" placeholder="TradeMatch contract 0x..." />
        <button type="button" class="btn small" id="btn-attach">Attach</button>
        <span class="addr" id="wallet-addr">—</span>
        <button type="button" class="btn primary" id="btn-connect">Connect wallet</button>
      </div>
    </header>

    <div class="stats" id="stats-bar" style="display:none;">
      <span>Fee: <strong id="stat-fee">—</strong> bps</span>
      <span>Min size: <strong id="stat-min">—</strong></span>
